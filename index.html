<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FaceSeal - 顔モザイク</title>
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    :root {
      --accent: #7c5cfc;
      --accent2: #c084fc;
      --bg: #0a0a0f;
      --surface: #15151e;
      --surface2: #1e1e2e;
      --border: #2a2a3a;
      --text: #eaeaf0;
      --text2: #8888a0;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: env(safe-area-inset-top, 0px) 0 0;
      overflow-x: hidden;
    }

    /* Header */
    header {
      padding: 2.5rem 1.5rem 0.5rem;
      text-align: center;
      width: 100%;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid;
      place-items: center;
    }
    .logo-icon svg { width: 20px; height: 20px; }
    header p {
      color: var(--text2);
      margin-top: 0.4rem;
      font-size: 0.85rem;
      font-weight: 400;
    }

    /* Upload */
    .upload-area {
      margin: 1.5rem 1rem;
      padding: 3rem 1.5rem;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
      max-width: 480px;
      width: calc(100% - 2rem);
    }
    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: scale(1.01);
    }
    .upload-area:active { transform: scale(0.99); }
    .upload-icon {
      width: 56px; height: 56px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px rgba(124, 92, 252, 0.25);
    }
    .upload-icon svg { width: 26px; height: 26px; }
    .upload-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .upload-sub {
      font-size: 0.8rem;
      color: var(--text2);
    }
    .upload-area input { display: none; }

    /* Status */
    #status {
      margin: 1rem;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: none;
      font-size: 0.85rem;
      text-align: center;
      backdrop-filter: blur(8px);
    }
    #status.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      max-width: 200px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      animation: progress 2s ease-in-out infinite;
      width: 40%;
    }
    @keyframes progress {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }

    /* Canvas */
    .canvas-wrapper {
      position: relative;
      margin: 0.75rem;
      display: none;
      max-width: 95vw;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }
    .canvas-wrapper.visible {
      display: block;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    canvas { display: block; max-width: 100%; cursor: pointer; touch-action: manipulation; }
    #overlayCanvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      display: none;
    }

    /* Face count badge */
    .face-count {
      display: none;
      margin: 0.75rem auto 0;
      padding: 0.35rem 0.8rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--text2);
      text-align: center;
      width: fit-content;
    }
    .face-count.visible { display: block; }
    .face-count strong { color: var(--accent2); font-weight: 600; }

    /* Mosaic type selector */
    .mosaic-types {
      display: none;
      margin: 0.6rem 1rem 0;
      padding: 0.3rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 480px;
      width: calc(100% - 2rem);
    }
    .mosaic-types.visible { display: flex; }
    .type-btn {
      flex: 1;
      padding: 0.5rem 0.3rem;
      border: none;
      border-radius: 9px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text2);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .type-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .type-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .type-btn:active { transform: scale(0.95); }

    /* Strength slider */
    .strength-control {
      display: none;
      align-items: center;
      gap: 0.6rem;
      margin: 0.5rem 1rem 0;
      padding: 0.55rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 480px;
      width: calc(100% - 2rem);
    }
    .strength-control.visible { display: flex; }
    .strength-label {
      font-size: 0.75rem;
      color: var(--text2);
      white-space: nowrap;
      font-weight: 500;
    }
    .strength-control input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .strength-control input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(124,92,252,0.4);
    }
    .strength-control input[type=range]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      cursor: pointer;
    }
    .strength-val {
      font-size: 0.75rem;
      color: var(--accent2);
      font-weight: 700;
      min-width: 1.2rem;
      text-align: right;
    }

    /* Hint */
    .hint {
      text-align: center;
      color: var(--text2);
      font-size: 0.8rem;
      margin-top: 0.5rem;
      display: none;
      animation: fadeUp 0.4s ease 0.2s both;
    }
    .hint.visible { display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
    .hint svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* Action buttons */
    .actions {
      position: sticky;
      bottom: 0;
      width: 100%;
      max-width: 480px;
      padding: 1rem 1rem calc(1rem + var(--safe-bottom));
      display: none;
      gap: 0.5rem;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 10;
    }
    .actions.visible {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      animation: fadeUp 0.4s ease 0.3s both;
    }
    .actions button {
      padding: 0.85rem 0.5rem;
      border: none;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }
    .actions button:active { transform: scale(0.96); }
    .actions button svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      grid-column: 1 / -1;
      box-shadow: 0 4px 16px rgba(124, 92, 252, 0.3);
      padding: 0.9rem 1rem;
    }
    .btn-primary svg { width: 18px; height: 18px; }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }
    .btn-secondary:active { background: var(--surface); }
    .btn-detect {
      background: var(--surface2);
      color: var(--accent2);
      border: 1px solid var(--accent) !important;
    }
    .btn-detect.active {
      background: rgba(124, 92, 252, 0.15);
    }

    /* Error state */
    .error-msg {
      display: none;
      text-align: center;
      padding: 1.5rem;
      margin: 1rem;
      background: var(--surface);
      border: 1px solid #3a2020;
      border-radius: var(--radius);
      max-width: 480px;
      width: calc(100% - 2rem);
    }
    .error-msg.visible { display: block; animation: fadeUp 0.3s ease; }
    .error-msg p { color: var(--text2); font-size: 0.85rem; margin-top: 0.3rem; }
    .error-msg .error-title { color: #f87171; font-weight: 600; font-size: 0.95rem; }

    /* Footer spacer */
    .spacer { height: calc(1rem + var(--safe-bottom)); flex-shrink: 0; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4"/>
        </svg>
      </div>
      FaceSeal
    </div>
    <p>顔を自動検出してモザイクをかける</p>
  </header>

  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">
      <svg fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 16V4m0 0L8 8m4-4l4 4"/>
        <path d="M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2"/>
      </svg>
    </div>
    <p class="upload-title">画像をアップロード</p>
    <p class="upload-sub">タップして選択 または ドラッグ&ドロップ</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div id="status">
    <span class="spinner"></span>
    <div>
      <div>顔を検出しています...</div>
      <div class="progress-bar"><div class="progress-bar-fill"></div></div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">
    <div class="error-title">顔が検出されませんでした</div>
    <p>別の画像をお試しください</p>
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="canvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div class="face-count" id="faceCount"></div>

  <!-- Mosaic type selector -->
  <div class="mosaic-types" id="mosaicTypes">
    <button class="type-btn active" data-type="pixel">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <rect x="3" y="3" width="4" height="4"/><rect x="10" y="3" width="4" height="4"/>
        <rect x="17" y="3" width="4" height="4"/><rect x="3" y="10" width="4" height="4"/>
        <rect x="10" y="10" width="4" height="4"/><rect x="17" y="10" width="4" height="4"/>
        <rect x="3" y="17" width="4" height="4"/><rect x="10" y="17" width="4" height="4"/>
        <rect x="17" y="17" width="4" height="4"/>
      </svg>
      モザイク
    </button>
    <button class="type-btn" data-type="blur">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 5v2M12 17v2M5 12H3M21 12h-2M7.05 7.05L5.64 5.64M18.36 18.36l-1.41-1.41M7.05 16.95l-1.41 1.41M18.36 5.64l-1.41 1.41"/>
      </svg>
      ぼかし
    </button>
    <button class="type-btn" data-type="fill">
      <svg fill="currentColor" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
      黒塗り
    </button>
  </div>

  <!-- Strength slider -->
  <div class="strength-control" id="strengthControl">
    <span class="strength-label">強度</span>
    <input type="range" id="strengthSlider" min="1" max="10" value="5">
    <span class="strength-val" id="strengthVal">5</span>
  </div>

  <p class="hint" id="hint">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/></svg>
    顔をタップしてモザイクを切り替え
  </p>

  <div class="actions" id="actions">
    <button class="btn-primary" id="btnDownload">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M12 4v12m0 0l-4-4m4 4l4-4M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2"/>
      </svg>
      ダウンロード
    </button>
    <button class="btn-secondary" id="btnMosaicAll">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4h4v4H4zM4 10h4v4H4zM10 4h4v4h-4zM10 10h4v4h-4zM16 4h4v4h-4zM16 10h4v4h-4z"/>
      </svg>
      全モザイク
    </button>
    <button class="btn-detect" id="btnDetect">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 4.5C1 3.12 2.12 2 3.5 2H7V4H3.5A.5.5 0 003 4.5V8H1zM23 4.5C23 3.12 21.88 2 20.5 2H17V4h3.5a.5.5 0 01.5.5V8h2zM1 19.5C1 20.88 2.12 22 3.5 22H7v-2H3.5a.5.5 0 01-.5-.5V16H1zM23 19.5C23 20.88 21.88 22 20.5 22H17v-2h3.5a.5.5 0 00.5-.5V16h2z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      検出
    </button>
    <button class="btn-secondary" id="btnReset">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M4 4v5h5M20 20v-5h-5"/><path d="M20.49 9A9 9 0 005.64 5.64L4 4m16 16l-1.64-1.64A9 9 0 014.51 15"/>
      </svg>
      別の画像
    </button>
  </div>

  <div class="spacer"></div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const errorMsg = document.getElementById('errorMsg');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const canvas = document.getElementById('canvas');
    const overlayCanvas = document.getElementById('overlayCanvas');
    const ctx = canvas.getContext('2d');
    const overlayCtx = overlayCanvas.getContext('2d');
    const hint = document.getElementById('hint');
    const actions = document.getElementById('actions');
    const faceCount = document.getElementById('faceCount');
    const mosaicTypes = document.getElementById('mosaicTypes');

    let originalImage = null;
    let faces = [];
    let displayScale = 1;
    let mosaicType = 'pixel';
    let mosaicStrength = 5;

    // --- Mosaic type selection ---
    const strengthControl = document.getElementById('strengthControl');
    const strengthSlider = document.getElementById('strengthSlider');
    const strengthVal = document.getElementById('strengthVal');

    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mosaicType = btn.dataset.type;
        // fill type has no meaningful strength
        if (mosaicType === 'fill') {
          strengthControl.classList.remove('visible');
        } else if (faces.length > 0) {
          strengthControl.classList.add('visible');
        }
        render();
      });
    });

    strengthSlider.addEventListener('input', () => {
      mosaicStrength = parseInt(strengthSlider.value);
      strengthVal.textContent = mosaicStrength;
      render();
    });

    // --- Model loading ---
    async function loadModels() {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.14/model/';
      await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
    }

    const modelsPromise = new Promise(resolve => {
      const check = setInterval(() => {
        if (typeof faceapi !== 'undefined') {
          clearInterval(check);
          loadModels().then(resolve);
        }
      }, 100);
    });

    // --- Upload ---
    uploadArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });
    uploadArea.addEventListener('dragover', e => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });

    async function handleFile(file) {
      if (!file.type.startsWith('image/')) return;

      status.classList.add('loading');
      errorMsg.classList.remove('visible');
      uploadArea.style.display = 'none';

      const img = new Image();
      img.onload = async () => {
        originalImage = img;
        canvas.width = img.width;
        canvas.height = img.height;
        overlayCanvas.width = img.width;
        overlayCanvas.height = img.height;

        const maxW = window.innerWidth * 0.95;
        displayScale = img.width > maxW ? maxW / img.width : 1;
        const cssWidth = displayScale < 1 ? maxW + 'px' : '';
        canvas.style.width = cssWidth;
        overlayCanvas.style.width = cssWidth;

        ctx.drawImage(img, 0, 0);
        await modelsPromise;

        const detections = await faceapi.detectAllFaces(canvas, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }));

        faces = detections.map(d => ({
          box: {
            x: Math.round(d.box.x),
            y: Math.round(d.box.y),
            width: Math.round(d.box.width),
            height: Math.round(d.box.height),
          },
          mosaic: true
        }));

        status.classList.remove('loading');

        if (faces.length === 0) {
          errorMsg.classList.add('visible');
          uploadArea.style.display = '';
          return;
        }

        render();
        canvasWrapper.classList.add('visible');
        faceCount.innerHTML = `<strong>${faces.length}</strong> 人の顔を検出`;
        faceCount.classList.add('visible');
        mosaicTypes.classList.add('visible');
        if (mosaicType !== 'fill') strengthControl.classList.add('visible');
        hint.classList.add('visible');
        actions.classList.add('visible');
      };
      img.src = URL.createObjectURL(file);
    }

    // --- Render ---
    function render() {
      ctx.drawImage(originalImage, 0, 0);
      faces.forEach(f => {
        if (f.mosaic) {
          if (mosaicType === 'pixel') applyPixel(f.box, mosaicStrength);
          else if (mosaicType === 'blur') applyBlur(f.box, mosaicStrength);
          else if (mosaicType === 'fill') applyFill(f.box);
        }
      });
    }

    // Natural pixel mosaic using block-average color
    function applyPixel(box, strength) {
      const blockSize = Math.round(4 + strength * 2.2); // 6–26px
      const { x, y, width: w, height: h } = box;
      const imgData = ctx.getImageData(x, y, w, h).data;

      for (let bx = 0; bx < w; bx += blockSize) {
        for (let by = 0; by < h; by += blockSize) {
          const bw = Math.min(blockSize, w - bx);
          const bh = Math.min(blockSize, h - by);
          let r = 0, g = 0, b = 0, count = 0;
          for (let px = bx; px < bx + bw; px++) {
            for (let py = by; py < by + bh; py++) {
              const i = (py * w + px) * 4;
              r += imgData[i]; g += imgData[i + 1]; b += imgData[i + 2];
              count++;
            }
          }
          ctx.fillStyle = `rgb(${Math.round(r/count)},${Math.round(g/count)},${Math.round(b/count)})`;
          ctx.fillRect(x + bx, y + by, bw, bh);
        }
      }
    }

    // Gaussian blur via offscreen canvas (avoids same-canvas filter artifacts)
    function applyBlur(box, strength) {
      const { x, y, width: w, height: h } = box;
      const radius = Math.round(4 + strength * 3.5); // 8–39px
      const pad = radius * 2;

      // Sample a padded region to avoid edge darkening
      const sx = Math.max(0, x - pad);
      const sy = Math.max(0, y - pad);
      const sw = Math.min(originalImage.width - sx, w + pad * 2);
      const sh = Math.min(originalImage.height - sy, h + pad * 2);

      const tmp = document.createElement('canvas');
      tmp.width = sw;
      tmp.height = sh;
      const tctx = tmp.getContext('2d');
      tctx.filter = `blur(${radius}px)`;
      tctx.drawImage(originalImage, sx, sy, sw, sh, 0, 0, sw, sh);

      // Copy only the face region (without pad) back
      ctx.drawImage(tmp, x - sx, y - sy, w, h, x, y, w, h);
    }

    function applyFill(box) {
      ctx.fillStyle = '#000';
      ctx.fillRect(box.x, box.y, box.width, box.height);
    }

    // --- Canvas click: toggle mosaic ---
    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const cx = (e.clientX - rect.left) / displayScale;
      const cy = (e.clientY - rect.top) / displayScale;

      let toggled = false;
      faces.forEach(f => {
        const b = f.box;
        if (cx >= b.x && cx <= b.x + b.width && cy >= b.y && cy <= b.y + b.height) {
          f.mosaic = !f.mosaic;
          toggled = true;
        }
      });
      if (toggled) render();
    });

    // --- Detection overlay ---
    function renderOverlay() {
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      const pad = 6;
      faces.forEach((f, i) => {
        const { x, y, width: w, height: h } = f.box;
        const rx = x - pad, ry = y - pad, rw = w + pad * 2, rh = h + pad * 2;

        // Semi-transparent fill
        overlayCtx.fillStyle = 'rgba(124, 92, 252, 0.12)';
        overlayCtx.fillRect(rx, ry, rw, rh);

        // Border
        overlayCtx.strokeStyle = '#7c5cfc';
        overlayCtx.lineWidth = Math.max(2, Math.round(w / 60));
        overlayCtx.strokeRect(rx, ry, rw, rh);

        // Corner accents
        const cl = Math.min(20, w * 0.2);
        overlayCtx.strokeStyle = '#c084fc';
        overlayCtx.lineWidth = Math.max(3, Math.round(w / 40));
        [
          [[rx, ry + cl], [rx, ry], [rx + cl, ry]],
          [[rx + rw - cl, ry], [rx + rw, ry], [rx + rw, ry + cl]],
          [[rx, ry + rh - cl], [rx, ry + rh], [rx + cl, ry + rh]],
          [[rx + rw - cl, ry + rh], [rx + rw, ry + rh], [rx + rw - cl, ry + rh]]
        ].forEach(pts => {
          overlayCtx.beginPath();
          overlayCtx.moveTo(pts[0][0], pts[0][1]);
          overlayCtx.lineTo(pts[1][0], pts[1][1]);
          overlayCtx.lineTo(pts[2][0], pts[2][1]);
          overlayCtx.stroke();
        });

        // Label
        const label = `顔 ${i + 1}`;
        const fs = Math.max(12, Math.round(w / 6));
        overlayCtx.font = `bold ${fs}px -apple-system, sans-serif`;
        const tw = overlayCtx.measureText(label).width;
        const lh = fs + 8;
        const lx = rx;
        const ly = ry - lh - 2;
        if (ly > 0) {
          overlayCtx.fillStyle = '#7c5cfc';
          overlayCtx.beginPath();
          overlayCtx.roundRect(lx, ly, tw + 16, lh, 4);
          overlayCtx.fill();
          overlayCtx.fillStyle = '#fff';
          overlayCtx.fillText(label, lx + 8, ly + fs + 2);
        } else {
          overlayCtx.fillStyle = '#7c5cfc';
          overlayCtx.beginPath();
          overlayCtx.roundRect(lx, ry + 4, tw + 16, lh, 4);
          overlayCtx.fill();
          overlayCtx.fillStyle = '#fff';
          overlayCtx.fillText(label, lx + 8, ry + 4 + fs + 2);
        }
      });
    }

    const btnDetect = document.getElementById('btnDetect');

    function showDetection(e) {
      e.preventDefault();
      renderOverlay();
      overlayCanvas.style.display = 'block';
      btnDetect.classList.add('active');
    }

    function hideDetection() {
      overlayCanvas.style.display = 'none';
      overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      btnDetect.classList.remove('active');
    }

    btnDetect.addEventListener('mousedown', showDetection);
    btnDetect.addEventListener('touchstart', showDetection, { passive: false });
    document.addEventListener('mouseup', hideDetection);
    document.addEventListener('touchend', hideDetection);

    // --- Other buttons ---
    document.getElementById('btnMosaicAll').addEventListener('click', () => {
      faces.forEach(f => f.mosaic = true);
      render();
    });

    document.getElementById('btnDownload').addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'faceseal_' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    document.getElementById('btnReset').addEventListener('click', () => {
      faces = [];
      originalImage = null;
      canvasWrapper.classList.remove('visible');
      hint.classList.remove('visible');
      actions.classList.remove('visible');
      faceCount.classList.remove('visible');
      mosaicTypes.classList.remove('visible');
      strengthControl.classList.remove('visible');
      errorMsg.classList.remove('visible');
      uploadArea.style.display = '';
      fileInput.value = '';
      status.style.display = '';
      status.classList.remove('loading');
      overlayCanvas.style.display = 'none';
    });
  </script>
</body>
</html>
